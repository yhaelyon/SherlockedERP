# ── WhatsApp Proxy Service (Railway) ──────────────────────
# Thin proxy between Evolution API and the main Fastify API.
# Deploy root: apps/whatsapp

[build]
builder      = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand           = "node dist/index.js"
healthcheckPath        = "/health"
healthcheckTimeout     = 30
restartPolicyType      = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway environment variables to set in the dashboard:
#   PORT                    = 3003
#   EVOLUTION_API_URL       = https://<evolution-service>.railway.app
#   EVOLUTION_API_KEY       = <your-strong-key>
#   EVOLUTION_INSTANCE_NAME = sherlocked-main
#   WHATSAPP_SERVICE_URL    = https://<this-service>.railway.app
#   API_BASE_URL            = https://<api-service>.railway.app
