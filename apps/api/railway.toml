# ── Main API Service (Railway) ─────────────────────────────
# Fastify backend — bookings, payments, WhatsApp queue, etc.
# Deploy root: apps/api

[build]
builder      = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand           = "node dist/index.js"
healthcheckPath        = "/health"
healthcheckTimeout     = 30
restartPolicyType      = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway environment variables to set in the dashboard:
#   PORT                      = 3001
#   NEXT_PUBLIC_SUPABASE_URL  = https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY = <service-role-key>
#   REDIS_URL                 = redis://...railway.app:6379
#   EVOLUTION_API_URL         = https://<evolution-service>.railway.app
#   EVOLUTION_API_KEY         = <your-strong-key>
#   EVOLUTION_INSTANCE_NAME   = sherlocked-main
#   JWT_SECRET                = <random-64-char-string>
